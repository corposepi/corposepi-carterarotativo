<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acuerdo de Pago · CORPOSEPI®</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{--az:#163A6B;--azv:#2C6FB5;--ro:#C0392B;--ve:#16A34A;--am:#F59E0B;--gf:#F1F5FA;--gb:#E3E9F0;--ts:#64748B;--tx:#1E293B}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#EAF0F7;color:var(--tx);line-height:1.5;padding:14px}
  .wrap{max-width:560px;margin:0 auto}
  .head{background:linear-gradient(135deg,var(--az),var(--azv));color:#fff;border-radius:16px 16px 0 0;padding:20px 18px;text-align:center}
  .head .logo{width:104px;height:104px;margin:0 auto 6px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.15)}
  .head .logo img{width:100%;height:100%;object-fit:contain}
  .head h1{font-size:18px;margin-top:4px}
  .head p{font-size:12px;opacity:.9;margin-top:2px}
  .card{background:#fff;padding:18px;box-shadow:0 2px 14px rgba(20,50,90,.06)}
  .card:last-child{border-radius:0 0 16px 16px}
  h2{font-size:15px;color:var(--az);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .resumen{background:var(--gf);border-radius:11px;padding:14px}
  .rline{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--gb)}
  .rline:last-child{border-bottom:0}
  .rtot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:10px;border-top:2px solid var(--gb)}
  .rtot b{font-size:20px;color:var(--ro)}
  .meta{background:#FFF7E6;border:1px solid #FCD34D;border-radius:11px;padding:12px;font-size:13px;margin-top:12px;color:#92400E}
  .cond{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:11px;padding:12px 14px;font-size:12.5px;margin-top:12px;color:#1E40AF}
  .cond li{margin:4px 0 4px 18px}
  .espera{background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:11px;padding:12px 14px;font-size:12.5px;margin-top:12px;color:#991B1B}
  .hint{font-size:10.5px;color:var(--azv);font-weight:700;margin-top:5px}
  .cuota{border:1px solid var(--gb);border-radius:11px;padding:11px;margin-bottom:9px;background:#fff}
  .crow{display:grid;grid-template-columns:1.1fr 1fr auto;gap:8px;align-items:end}
  label{font-size:11px;color:var(--ts);font-weight:700;display:block;margin-bottom:3px}
  input{width:100%;padding:10px;border:1.5px solid var(--gb);border-radius:9px;font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:var(--azv)}
  .cnum{font-size:11px;color:var(--az);font-weight:800;margin-bottom:6px}
  .btn{border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .b-add{background:#fff;color:var(--az);border:1.5px dashed var(--azv);width:100%;margin-top:2px}
  .b-go{background:var(--ve);color:#fff;width:100%;padding:15px;font-size:16px;margin-top:14px}
  .b-go:disabled{background:#9CA3AF;cursor:not-allowed}
  .b-x{background:#FEE2E2;color:var(--ro);border:none;border-radius:8px;padding:8px 10px;font-size:15px;cursor:pointer;height:42px}
  .b-alt{background:#fff;color:var(--az);border:1.5px solid var(--az);width:100%;margin-top:8px}
  .estado{font-weight:800;font-size:14px;text-align:center;padding:10px;border-radius:10px;margin-top:10px}
  .ok{background:#EAF7EE;color:var(--ve)}
  .warn{background:#FEF3C7;color:#92400E}
  .msg{text-align:center;padding:40px 20px;color:var(--ts)}
  .msg .ei{font-size:44px}
  .foot{text-align:center;font-size:11px;color:var(--ts);margin-top:14px}
  .ok-box{text-align:center;padding:30px 18px}
  .ok-box .ei{font-size:52px}
  .ok-box h2{justify-content:center;font-size:18px;margin-top:8px}
  .aviso{font-size:12px;color:var(--ts);margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><img src="logo-corposepi.png" alt="CORPOSEPI"></div>
    <h1>CORPOSEPI®</h1>
    <p>Formato de acuerdo de pago</p>
  </div>
  <div class="card" id="app">
    <div class="msg"><div class="ei">⏳</div><p>Cargando su información…</p></div>
  </div>
  <div class="foot">Madrid, Cundinamarca · CORPOSEPI® · 📞 320 833 1293</div>
</div>

<script>
const FB={apiKey:"AIzaSyARjZP37yHcNRtIFWXarSVvYJ4ZOChuZ54",authDomain:"corposepi-carnets.firebaseapp.com",databaseURL:"https://corposepi-carnets-default-rtdb.firebaseio.com",projectId:"corposepi-carnets"};
firebase.initializeApp(FB);
const fbdb=firebase.database();
const g=id=>document.getElementById(id);
const fmt=v=>"$"+(parseInt(v)||0).toLocaleString("es-CO");
const fFecha=iso=>{if(!iso)return"—";const p=(""+iso).split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso;};
const hoyISO=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const params=new URLSearchParams(location.search);
const CC=(params.get("cc")||"").trim();
let P=null, rows=[];

if(!CC){ g("app").innerHTML='<div class="msg"><div class="ei">🔗</div><p>Enlace incompleto. Solicite el link a CORPOSEPI®.</p></div>'; }
else fbdb.ref("propuestas_acuerdo/"+CC).on("value",snap=>{ P=snap.val(); render(); });

function render(){
  if(!P){ g("app").innerHTML='<div class="msg"><div class="ei">🤔</div><p>No encontramos un formato activo para este enlace.<br>Comuníquese con CORPOSEPI® al 320 833 1293.</p></div>'; return; }

  // Ya aceptado → mostrar acuerdo confirmado
  if(P.estado==="aceptado"){
    const cu=(P.acordado?.cuotas)||(P.propuesta?.cuotas)||[];
    const tot=cu.reduce((s,c)=>s+(parseInt(c.monto)||0),0);
    g("app").innerHTML=`<div class="ok-box"><div class="ei">✅</div><h2>¡Acuerdo confirmado!</h2>
      <p class="aviso">Familia <b>${P.nombre||""}</b>, su acuerdo de pago quedó registrado. Le agradecemos cumplir en las fechas indicadas:</p>
      <div class="resumen" style="text-align:left;margin-top:14px">${cu.map(c=>`<div class="rline"><span>📅 ${fFecha(c.fecha)}</span><b>${fmt(c.monto)}</b></div>`).join("")}
      <div class="rtot"><span>Total acordado</span><b style="color:var(--ve)">${fmt(tot)}</b></div></div>
      <p class="aviso" style="margin-top:14px">Ante cualquier novedad escríbanos al 📞 320 833 1293. ¡Gracias por su compromiso! 🤝</p></div>`;
    return;
  }

  // Incumplido → servicio de apoyo educativo restringido
  if(P.estado==="incumplido"){
    g("app").innerHTML=`<div class="ok-box"><div class="ei">⛔</div><h2>Servicio restringido</h2>
      <p class="aviso">Familia <b>${P.nombre||""}</b>, el acuerdo de pago quedó <b>incumplido</b> y el <b>servicio de apoyo educativo está restringido</b>.</p>
      <div class="espera" style="text-align:left;margin-top:12px">Para reactivarlo, por favor comuníquese con CORPOSEPI® y regularice su pago.</div>
      <p class="aviso" style="margin-top:10px">📞 320 833 1293</p></div>`;
    return;
  }

  // Formato vencido: el plazo es el último día del mes; pasada esa fecha no se puede crear el acuerdo
  if(P.fechaLimite && hoyISO() > P.fechaLimite){
    g("app").innerHTML=`<div class="ok-box"><div class="ei">⌛</div><h2>Este formato ya venció</h2>
      <p class="aviso">Familia <b>${P.nombre||""}</b>, el plazo de este acuerdo era hasta el <b>${fFecha(P.fechaLimite)}</b> (último día de ${P.mesActual||"ese mes"}) y ya pasó.</p>
      <div class="espera" style="text-align:left;margin-top:12px">📌 La prioridad es pagar <b>la pensión del mes en curso</b>. Por favor solicite a CORPOSEPI® un <b>formato nuevo del mes actual</b> para hacer su acuerdo.</div>
      <p class="aviso" style="margin-top:10px">📞 320 833 1293</p></div>`;
    return;
  }

  const total=P.total||0;
  const desg=(P.desglose||[]);
  const fl=P.fechaLimite||"";
  const mesNom=(P.mesActual||"este mes").split(" ")[0];
  const pm=(P.abonoMin!=null?P.abonoMin:(P.pensionMes||0));
  const abonoLabel=P.abonoLabel||("pensión de "+mesNom);
  const dias=P.diasAbono||3;

  // Bloque de deuda + condiciones (común)
  const cabecera=`
    <h2>👋 Familia ${P.nombre||""}</h2>
    <p class="aviso">Este es el detalle de lo pendiente con CORPOSEPI®. Abajo puede <b>proponer sus fechas y montos</b> de pago.</p>
    <div class="resumen" style="margin-top:12px">
      ${desg.map(d=>`<div class="rline"><span>Pensión de ${d.mes}</span><b>${fmt(d.monto)}</b></div>`).join("")||'<div class="rline"><span>Total pendiente</span><b>'+fmt(total)+'</b></div>'}
      <div class="rtot"><span>Total a quedar al día</span><b>${fmt(total)}</b></div>
    </div>
    <div class="meta">🎯 <b>Meta:</b> quedar completamente al día <b>antes del ${fFecha(fl)}</b> (último día de ${P.mesActual||"este mes"}).</div>
    <div class="cond">Para que su propuesta sea válida, tenga en cuenta:
      <ul>
        <li>El <b>primer abono es ${abonoLabel}${pm>0?` (${fmt(pm)})`:""}</b>, a pagar <b>máximo ${dias} día${dias>1?'s':''}</b> después de este acuerdo. No puede ser menor; si <b>abona más, ${P.tipoFormato==="mitad"?"adelanta el resto de la deuda":"el excedente cubre la mora"}</b>.</li>
        <li>El <b>resto</b> se paga en <b>máximo 2 cuotas</b>: la <b>2ª el ${fFecha(dia21ISO())}</b> (mínimo <b>30% del saldo</b>) y la <b>3ª el ${fFecha(dia31ISO())}</b> con lo que falte.</li>
        <li>Al <b>${fFecha(fl)}</b> debe quedar <b>al día, sin excepción</b>.</li>
        <li>La suma debe <b>cubrir el total</b> (${fmt(total)}).</li>
      </ul>
      <div style="margin-top:8px;font-weight:700;color:#991B1B">📌 Sin un acuerdo de pago vigente, no se puede prestar el servicio de apoyo educativo.</div>
    </div>
    <div class="espera">⏳ <b>Importante:</b> enviar este formulario <b>no</b> significa que el acuerdo ya esté aprobado. CORPOSEPI® debe <b>revisarlo y aceptarlo</b>. Usted recibirá un mensaje de WhatsApp con la <b>aceptación</b>, una <b>contrapropuesta</b> o un <b>rechazo</b>. El acuerdo queda <b>en firme solo cuando reciba esa confirmación</b>.</div>`;

  // Contrapropuesta pendiente de confirmar
  if(P.estado==="contrapropuesta" && P.contrapropuesta){
    const cu=P.contrapropuesta.cuotas||[], tot=cu.reduce((s,c)=>s+(parseInt(c.monto)||0),0);
    g("app").innerHTML=cabecera+`
      <div style="margin-top:16px">
        <h2>↩️ CORPOSEPI le propone estos ajustes</h2>
        <div class="resumen">${cu.map(c=>`<div class="rline"><span>📅 ${fFecha(c.fecha)}</span><b>${fmt(c.monto)}</b></div>`).join("")}
        <div class="rtot"><span>Total</span><b>${fmt(tot)}</b></div></div>
        ${P.contrapropuesta.obs?`<p class="aviso" style="margin-top:6px">💬 ${P.contrapropuesta.obs}</p>`:""}
        <button class="btn b-go" onclick="aceptarContra()">✅ Acepto estos ajustes</button>
        <button class="btn b-alt" onclick="P.estado='propuesta';rows=[];render()">✍️ Prefiero enviar otra propuesta</button>
      </div>`;
    return;
  }

  // Editor de propuesta — plan fijo de máximo 3 cuotas
  if(!rows.length){
    const prev=P.propuesta?.cuotas;
    if(prev&&prev.length){ rows=prev.map(c=>({fecha:c.fecha,monto:c.monto})); }
    else { rows=[{fecha:hoyISO(), monto:(pm>0?String(pm):"")}, {fecha:dia21ISO(),monto:""}, {fecha:dia31ISO(),monto:""}]; }
  }
  while(rows.length<3) rows.push({fecha:(rows.length===1?dia21ISO():dia31ISO()), monto:""});
  g("app").innerHTML=cabecera+`
    <div style="margin-top:16px">
      <h2>✍️ Su plan de pago <span style="font-size:12px;color:var(--ts);font-weight:400">(máx. 3 cuotas · al día el ${fFecha(P.fechaLimite||"")})</span></h2>
      <div id="plan"></div>
      <div style="margin-top:12px"><label>Comentario para CORPOSEPI® (opcional)</label><input id="obs" placeholder="Ej: el 21 recibo un pago y abono el resto"></div>
      <div id="saldo" class="estado"></div>
      <button class="btn b-go" id="enviar" onclick="enviar()">📲 Enviar mi propuesta</button>
      <p class="aviso" style="text-align:center">La revisamos y le confirmamos por WhatsApp.</p>
    </div>`;
  const obsPrev=P.propuesta?.obs; if(obsPrev&&g("obs"))g("obs").value=obsPrev;
  renderPlan();
}

function abonoMaxISO(){
  const dias=P.diasAbono||3;
  const d=new Date(); d.setDate(d.getDate()+dias);
  const iso=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const fl=P.fechaLimite||""; return (fl&&iso>fl)?fl:iso;
}
function dia21ISO(){ const fl=P.fechaLimite||""; if(!fl)return hoyISO(); const p=fl.split("-"); const iso=p[0]+"-"+p[1]+"-21"; return iso<hoyISO()?hoyISO():iso; }
function dia31ISO(){ return P.fechaLimite||hoyISO(); }
function renderPlan(){
  const min=hoyISO(), abonoMax=abonoMaxISO(), dias=P.diasAbono||3;
  const abonoLabel=P.abonoLabel||"pensión del mes", pm=(P.abonoMin!=null?P.abonoMin:(P.pensionMes||0));
  const d21=dia21ISO(), d31=dia31ISO();
  rows[1]=rows[1]||{}; rows[1].fecha=d21;
  rows[2]=rows[2]||{}; rows[2].fecha=d31;
  g("plan").innerHTML=`
    <div class="cuota">
      <div class="cnum">1ª cuota · abono inicial · ${abonoLabel}</div>
      <div class="crow">
        <div><label>Fecha de pago</label><input type="date" value="${rows[0]?.fecha||""}" min="${min}" max="${abonoMax}" onchange="setPlan(0,'fecha',this.value)"></div>
        <div><label>Monto (mín. ${fmt(pm)})</label><input type="number" inputmode="numeric" min="${pm}" value="${rows[0]?.monto||""}" placeholder="$0" oninput="setPlan(0,'monto',this.value)"></div>
        <span></span>
      </div>
      <div id="abono-info" class="hint"></div>
      <div class="hint">📅 Máximo ${dias} día${dias>1?'s':''} desde hoy · a más tardar el ${fFecha(abonoMax)}</div>
    </div>
    <div id="plan-saldo" style="text-align:center;font-size:12.5px;margin:8px 0"></div>
    <div class="cuota">
      <div class="cnum">2ª cuota · ${fFecha(d21)}</div>
      <div class="crow">
        <div><label>Fecha</label><input type="date" value="${d21}" disabled></div>
        <div><label id="c2-lbl">Monto</label><input id="c2-monto" type="number" inputmode="numeric" value="${rows[1]?.monto||""}" placeholder="$0" oninput="setPlan(1,'monto',this.value)"></div>
        <span></span>
      </div>
      <div id="c2-info" class="hint"></div>
    </div>
    <div class="cuota">
      <div class="cnum" id="c3-title">3ª cuota · ${fFecha(d31)}</div>
      <div class="crow">
        <div><label>Fecha</label><input type="date" value="${d31}" disabled></div>
        <div><label>Monto (resto)</label><input id="c3-monto" type="number" value="${rows[2]?.monto||""}" placeholder="$0" disabled></div>
        <span></span>
      </div>
      <div class="hint">Se calcula solo: saldo − 2ª cuota. Al ${fFecha(d31)} debe quedar al día, <b>sin excepción</b>.</div>
    </div>`;
  planCompute();
}
function planCompute(){
  const total=P.total||0;
  const c1=parseInt(rows[0]?.monto)||0, c2=parseInt(rows[1]?.monto)||0;
  const saldo=Math.max(0,total-c1), c2Min=Math.round(saldo*0.30), c3=Math.max(0,saldo-c2);
  rows[2]=rows[2]||{fecha:dia31ISO()}; rows[2].monto=c3?String(c3):"";
  const ps=g("plan-saldo"); if(ps) ps.innerHTML=saldo>0?`Saldo a repartir en 2ª y 3ª: <b>${fmt(saldo)}</b>`:`<span style="color:#16A34A">✓ La 1ª cuota cubre todo</span>`;
  if(g("c2-lbl")) g("c2-lbl").textContent=`Monto (mín. 30% = ${fmt(c2Min)})`;
  if(g("c2-monto")) g("c2-monto").min=c2Min;
  if(g("c3-monto")) g("c3-monto").value=c3||"";
  if(g("c3-title")) g("c3-title").textContent=`3ª cuota · ${fFecha(dia31ISO())} ${(saldo<=0||c3<=0)?"(no necesaria)":"(lo que falte)"}`;
  abonoInfo();
  const c2el=g("c2-info");
  if(c2el){
    if(saldo<=0){ c2el.style.color="#16A34A"; c2el.textContent="✓ No requiere más cuotas."; }
    else if(c2<c2Min){ c2el.style.color="#B91C1C"; c2el.innerHTML=`⚠ Mínimo el 30% del saldo: <b>${fmt(c2Min)}</b>`; }
    else if(c2>=saldo){ c2el.style.color="#16A34A"; c2el.innerHTML=`✓ Paga todo el saldo el ${fFecha(dia21ISO())} · no necesita 3ª`; }
    else { c2el.style.color="#16A34A"; c2el.innerHTML=`✓ ${fmt(c2)} el ${fFecha(dia21ISO())} + ${fmt(c3)} el ${fFecha(dia31ISO())}`; }
  }
  const v=validarPlan(), el=g("saldo"), btn=g("enviar");
  if(el&&btn){ if(!v.ok){ el.className="estado warn"; el.innerHTML=v.m; btn.disabled=true; } else { el.className="estado ok"; el.textContent="✓ Plan listo para enviar"; btn.disabled=false; } }
}
function setPlan(i,k,v){ rows[i]=rows[i]||{}; rows[i][k]=v; planCompute(); }
function abonoInfo(){
  const el=g("abono-info"); if(!el)return;
  const pm=(P.abonoMin!=null?P.abonoMin:(P.pensionMes||0)), c0=parseInt(rows[0]?.monto)||0, lbl=P.abonoLabel||"pensión del mes";
  if(pm<=0){ el.textContent=""; return; }
  if(c0<pm){ el.style.color="#B91C1C"; el.innerHTML=`⚠ El primer abono debe ser mínimo ${lbl}: <b>${fmt(pm)}</b>`; return; }
  el.style.color="#16A34A";
  const extra=c0-pm;
  if(P.tipoFormato==="mitad"){
    el.innerHTML=`✓ ${lbl} <b>${fmt(pm)}</b>${extra>0?` + ${fmt(extra)} adicional (adelanta el resto)`:""}`;
  } else {
    const mora=Math.max(0,(P.total||0)-pm), aMora=Math.min(extra,mora), sobra=extra-aMora;
    el.innerHTML=`✓ ${lbl} <b>${fmt(pm)}</b>${aMora>0?` + <b>${fmt(aMora)}</b> de abono a la mora`:""}${sobra>0?` + ${fmt(sobra)} de más`:""}`;
  }
}
function validarPlan(){
  const total=P.total||0, pm=(P.abonoMin!=null?P.abonoMin:(P.pensionMes||0)), lbl=P.abonoLabel||"pensión del mes", dias=P.diasAbono||3;
  const min=hoyISO(), abonoMax=abonoMaxISO();
  const c1=parseInt(rows[0]?.monto)||0, c1f=rows[0]?.fecha||"";
  if(c1<pm) return {ok:false,m:`El 1er abono debe ser al menos ${lbl} (${fmt(pm)}).`};
  if(!c1f||c1f<min||c1f>abonoMax) return {ok:false,m:`El 1er abono debe pagarse a más tardar el ${fFecha(abonoMax)} (${dias} día${dias>1?'s':''}).`};
  const saldo=Math.max(0,total-c1), c2Min=Math.round(saldo*0.30), c2=parseInt(rows[1]?.monto)||0;
  const cuotas=[{fecha:c1f,monto:c1}];
  if(saldo>0){
    if(c2<c2Min) return {ok:false,m:`La 2ª cuota debe ser mínimo el 30% del saldo (${fmt(c2Min)}).`};
    if(c2>saldo) return {ok:false,m:`La 2ª cuota no puede superar el saldo (${fmt(saldo)}).`};
    cuotas.push({fecha:dia21ISO(),monto:c2});
    const c3=saldo-c2; if(c3>0) cuotas.push({fecha:dia31ISO(),monto:c3});
  }
  return {ok:true, cuotas};
}
function enviar(){
  if(P.fechaLimite && hoyISO()>P.fechaLimite){ alert("⚠ Este formato venció el "+fFecha(P.fechaLimite)+". Solicite uno nuevo a CORPOSEPI®."); render(); return; }
  const v=validarPlan(); if(!v.ok){ alert("⚠ "+v.m.replace(/<[^>]+>/g,"")); return; }
  g("enviar").disabled=true; g("enviar").textContent="Enviando…";
  fbdb.ref("propuestas_acuerdo/"+CC).update({
    estado:"propuesta",
    propuesta:{cuotas:v.cuotas, total:v.cuotas.reduce((s,c)=>s+c.monto,0), obs:(g("obs")?.value||""), fecha:hoyISO()}
  }).then(()=>{
    g("app").innerHTML=`<div class="ok-box"><div class="ei">📨</div><h2>¡Propuesta enviada!</h2>
      <p class="aviso">Gracias, familia <b>${P.nombre||""}</b>. Su propuesta quedó <b>registrada</b>, pero <b>aún no está aprobada</b>.</p>
      <div class="espera" style="text-align:left;margin-top:12px">⏳ CORPOSEPI® la revisará y usted recibirá un mensaje de WhatsApp con la <b>aceptación</b>, una <b>contrapropuesta</b> o un <b>rechazo</b>. El acuerdo queda <b>en firme solo cuando reciba esa confirmación</b>.</div>
      <p class="aviso" style="margin-top:10px">Puede cerrar esta página. 🙏</p></div>`;
  }).catch(e=>{ alert("❌ No se pudo enviar: "+e.message); g("enviar").disabled=false; g("enviar").textContent="📲 Enviar mi propuesta"; });
}
function aceptarContra(){
  if(P.fechaLimite && hoyISO()>P.fechaLimite){ alert("⚠ Este formato venció el "+fFecha(P.fechaLimite)+". Solicite uno nuevo a CORPOSEPI®."); render(); return; }
  const cu=P.contrapropuesta?.cuotas||[];
  fbdb.ref("propuestas_acuerdo/"+CC).update({
    estado:"propuesta",
    propuesta:{cuotas:cu.map(c=>({fecha:c.fecha,monto:parseInt(c.monto)})), total:cu.reduce((s,c)=>s+(parseInt(c.monto)||0),0), obs:"Acepté la contrapropuesta de CORPOSEPI®", fecha:hoyISO()}
  }).then(()=>{
    g("app").innerHTML=`<div class="ok-box"><div class="ei">🤝</div><h2>¡Gracias!</h2>
      <p class="aviso">Confirmamos que acepta los ajustes propuestos. CORPOSEPI® finalizará el acuerdo y le enviará la confirmación por WhatsApp.</p></div>`;
  }).catch(e=>alert("❌ "+e.message));
}
</script>
